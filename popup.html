<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 320px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    h1 { font-size: 16px; margin: 0 0 12px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .tab { flex: 1; padding: 8px; border: none; background: #f0f0f0; cursor: pointer; border-radius: 4px; }
    .tab.active { background: #4285f4; color: white; }
    .section { display: none; }
    .section.active { display: block; }
    .btn { width: 100%; padding: 10px; margin: 8px 0; background: #4285f4; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .btn:hover { background: #3367d6; }
    input, textarea { width: 100%; padding: 8px; margin: 4px 0; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; }
    #bookmark-list { max-height: 200px; overflow-y: auto; }
    .bookmark-item { padding: 8px; border-bottom: 1px solid #eee; cursor: pointer; }
    .bookmark-item:hover { background: #f5f5f5; }
    .ai-summary { background: #f8f9fa; padding: 12px; border-radius: 4px; white-space: pre-wrap; font-size: 13px; }
  </style>
</head>
<body>
  <h1>abc-extension</h1>
  
  <div class="tabs">
    <button class="tab active" data-tab="bookmarks">书签</button>
    <button class="tab" data-tab="extract">提取</button>
    <button class="tab" data-tab="ai">AI 总结</button>
  </div>

  <div id="bookmarks" class="section active">
    <button class="btn" id="saveBookmark">保存当前页面到书签</button>
    <div id="bookmark-list"></div>
  </div>

  <div id="extract" class="section">
    <button class="btn" id="extractContent">提取页面能力</button>
    <pre id="extractResult" style="background:#f8f9fa;padding:8px;border-radius:4px;max-height:200px;overflow:auto;font-size:12px;"></pre>
  </div>

  <div id="ai" class="section">
    <input type="text" id="apiKey" placeholder="输入 API Key (可选)" />
    <button class="btn" id="summarize">AI 总结当前页面</button>
    <div id="summaryResult" class="ai-summary"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
